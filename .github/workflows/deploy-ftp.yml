name: Deploy Next.js to FTP Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Create production environment file
        run: |
          if [ -n "${{ secrets.NEXT_PUBLIC_API_BASE_URL }}" ]; then
            echo "NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}" > .env.production
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Prepare deploy package
        run: |
          rm -rf deploy-package
          mkdir -p deploy-package/.next
          mkdir -p deploy-package/tmp
          cp server.js deploy-package/server.js
          cp .htaccess deploy-package/.htaccess
          cp -R .next/standalone deploy-package/.next/standalone
          cp -R .next/static deploy-package/.next/static
          cp -R public deploy-package/public
          date -u +"%Y-%m-%dT%H:%M:%SZ" > deploy-package/tmp/restart.txt

      - name: Deploy to FTP server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy-package/
          server-dir: ${{ vars.FTP_SERVER_DIR }}
