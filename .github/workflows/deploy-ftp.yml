name: Deploy Next.js to FTP Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Create production environment file
        run: |
          if [ -n "${{ secrets.NEXT_PUBLIC_API_BASE_URL }}" ]; then
            echo "NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}" > .env.production
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Prepare deploy package
        run: |
          rm -rf deploy-package
          mkdir -p deploy-package/.next
          mkdir -p deploy-package/tmp
          cp server.js deploy-package/server.js
          cp .htaccess deploy-package/.htaccess
          cp -R .next/standalone deploy-package/.next/standalone
          cp -R .next/static deploy-package/.next/static
          cp -R public deploy-package/public
          date -u +"%Y-%m-%dT%H:%M:%SZ" > deploy-package/tmp/restart.txt

      - name: Validate deploy configuration
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          missing=0
          for key in FTP_HOST FTP_USER FTP_PASS; do
            if [ -z "${!key}" ]; then
              echo "::error::$key no esta configurado en GitHub Actions"
              missing=1
            fi
          done
          exit $missing

      - name: Check FTP host DNS
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
        run: |
          node -e "const dns=require('node:dns').promises; dns.lookup(process.env.FTP_HOST).then(()=>console.log('FTP host resuelve correctamente')).catch((err)=>{console.error('::error::No se pudo resolver el host FTP. Revisa el secret FTP_HOST.'); console.error(err.code || err.message); process.exit(1);})"

      - name: Deploy to FTP server
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftp
          port: 21
          local-dir: ./deploy-package/
          server-dir: /public_html/delicias.saborcentral.com/
          dangerous-clean-slate: false
